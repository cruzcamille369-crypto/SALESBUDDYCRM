<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container {
            width: 200px;
            height: 200px;
            overflow: auto;
            border: 1px solid black;
            direction: rtl;
        }
        .content {
            width: 400px;
            height: 400px;
            direction: ltr;
            background: linear-gradient(to right, red, blue);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">Hello World</div>
    </div>
</body>
</html>
